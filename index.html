<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baby Shower - Ricardo Daniel</title>

    <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Playfair+Display:wght@700&family=Cormorant+Garamond:wght@600&family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <!-- Open Graph meta tags (used by WhatsApp, Facebook, Telegram previews) -->
    <meta property="og:title" content="Baby Shower — Ricardo Daniel">
    <meta property="og:description" content="¡Te invitamos a celebrar la llegada de Ricardo Daniel — Sábado 13 de abril, 3:00 PM — San Juan de Conocoto">
    <!-- Use a public image URL for previews. Replace with your hosted image URL if you host the page. -->
    <meta property="og:image" content="https://upload.wikimedia.org/wikipedia/en/1/10/Winniethepooh.png">
    <meta property="og:type" content="website">
    <!-- Replace with the actual public URL where you'll host this page -->
    <meta property="og:url" content="https://robertososa25sr.github.io/babyshower/">
    <meta name="twitter:card" content="summary_large_image">

    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <div class="background-cloud cloud-1"></div>
    <div class="background-cloud cloud-2"></div>
    <div class="background-cloud cloud-3"></div>

    <div class="container">

        <div class="card">

            <div class="bee bee-1">
                <img src="img/bee.png" alt="Abeja">
            </div>

            <div class="bee bee-2">
                <img src="img/bee.png" alt="Abeja">
            </div>

            <div class="bee bee-3">
                <img src="img/bee.png" alt="Abeja">
            </div>

            <div class="bee bee-4">
                <img src="img/bee.png" alt="Abeja">
            </div>

            <section class="top-section">

                <div class="phrase-main">
                    ¡LA DULCE ESPERA ESTÁ POR TERMINAR!
                </div>

            </section>

            <section class="header-section">

                <div class="pooh-side">

                    <div class="character-bg pooh-bg">

                        <img
                            src="img/pooh.png"
                            alt="Winnie Pooh">

                    </div>

                </div>

                <div class="title-side">

                    <h1 class="title">
                        Baby <br>
                        Shower
                    </h1>

                </div>

            </section>

            <section class="invitation-message">

                <p class="invite-text">
                    Te invitamos a celebrar la llegada de nuestro pequeño
                </p>

                <div class="baby-name-container">

                    <div class="baby-name-decoration">
                        ✦ ✦ ✦
                    </div>

                    <div class="baby-name-first">
                        Ricardo
                    </div>

                    <div class="baby-name-last">
                        Daniel
                    </div>

                    <div class="baby-name-decoration">
                        ✦ ✦ ✦
                    </div>

                </div>

            </section>

            <section class="event-date">

                <div class="date-column">

                    <div class="date-title">
                        SÁBADO
                    </div>

                    <div class="date-hour">
                        3:00 PM
                    </div>

                </div>

                <div class="date-divider"></div>

                <div class="date-number">
                    13
                </div>

                <div class="date-divider"></div>

                <div class="date-column">

                    <div class="date-title">
                        ABRIL
                    </div>

                    <div class="date-year">
                        2026
                    </div>

                </div>

            </section>

            <section class="countdown-section">

                <div class="character-left">

                    <div class="character-bg tigger-bg small">

                        <img
                            src="img/tigger.png"
                            alt="Tigger">

                    </div>

                </div>

                <div class="countdown-wrapper">

                    <h3 class="countdown-title">
                        ¿Cuánto falta?
                    </h3>

                    <div class="countdown">

                        <div class="count-box">
                            <span id="days">00</span>
                            <small>Días</small>
                        </div>

                        <div class="count-box">
                            <span id="hours">00</span>
                            <small>Horas</small>
                        </div>

                        <div class="count-box">
                            <span id="minutes">00</span>
                            <small>Min.</small>
                        </div>

                        <div class="count-box">
                            <span id="seconds">00</span>
                            <small>Seg.</small>
                        </div>

                    </div>

                </div>

                <div class="character-right">

                    <div class="character-bg piglet-bg small">

                        <img
                            src="img/piglet.png"
                            alt="Piglet">

                    </div>

                </div>

            </section>

            <section class="location-section">

                <h3 class="location-title">
                    Dirección
                </h3>

                <div class="location-card">

                    <p class="location-name">
                        San Juan de Conocoto
                    </p>

                    <p class="location-address">
                        Leonidas Plaza G. y Segundo Nicanor Quiroz
                    </p>

                </div>

            </section>

            <section class="map-section">

                <button
                    id="open-maps"
                    class="map-button">

                    📍 Abrir ubicación en Google Maps

                </button>

            </section>

            <section class="bottom-character">

                <div class="character-bg iggor-bg">

                    <img
                        src="img/iggor.png"
                        alt="Ígor">

                </div>

            </section>

        </div>

    </div>

    <script src="script.js"></script>

</body>

</html>
